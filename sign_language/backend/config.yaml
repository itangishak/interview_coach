# Application Settings
app:
  name: "Sign Language Translator"
  version: "1.0.0"
  debug: false
  host: "0.0.0.0"
  port: 8000

# MediaPipe Settings
mediapipe:
  model_complexity: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  max_num_faces: 1
  max_num_hands: 2

# Sign Recognition
recognition:
  # Dynamic (Transformer)
  dynamic:
    sequence_length: 40
    input_dim: 225
    num_layers: 2
    num_heads: 4
    hidden_dim: 128
    num_classes: 120
    confidence_threshold: 0.70
  
  # Static (MLP)
  static:
    input_dim: 63
    hidden_dims: [128, 64]
    num_classes: 34
    confidence_threshold: 0.85

# Temporal Buffer
buffer:
  max_frames: 40
  motion_threshold: 0.02
  pause_frames: 10

# Face Recognition
face:
  model_name: "buffalo_l"
  detection_threshold: 0.6
  similarity_threshold: 0.4

# Speech
speech:
  default_voice: "female"
  rate: 150
  volume: 1.0

# Database
database:
  url: "sqlite:///./sign_language.db"
  echo: false

# Paths
paths:
  checkpoints_dynamic: "./checkpoints/dynamic"
  checkpoints_static: "./checkpoints/static"
  checkpoints_face: "./checkpoints/face"
  logs: "./logs"